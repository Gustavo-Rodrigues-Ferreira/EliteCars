<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/logocarro.png" type="image/x-icon">
    <link rel="stylesheet" href="login.css">
    <title>Login</title>
</head>

<body>
    <main>
        <div class="form">
            <h1>Elite Cars</h1>
            <h2>Faça seu login</h2>
            <fieldset>
                <form action="">
                    <div class="campo">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" placeholder="Digite seu nome..." required class="insira">
                    </div>

                    <div class="campo">
                        <label for="email">Email:</label>
                        <input type="email" placeholder="Seu melhor email..." required class="insira">
                    </div>

                    <div class="campo">
                        <label for="senha">Senha:</label>
                        <input type="password" placeholder="Digite sua senha..." required class="insira">
                    </div>

                    <div>
                        <input type="submit" value="Entrar" class="botao">
                        <input type="reset" value="Limpar" class="botao">
                    </div>
                </form>
            </fieldset>
        </div>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
      <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
      </script>
</body>

</html>
